            meta: "Telegram support, one-on-one guidance",
            content: `<p><strong>You are not alone. I answer every message personally.</strong><br>Whether you need help with registration, deposit, withdrawals, or just want to talk to someone who understands hardship — I'm here.</p>
            <p><a href="https://t.me/Nicole67888" class="contact-link" target="_blank" rel="noopener noreferrer">📱 Message me on Telegram: @Nicole67888</a>
            <a href="https://reel-shrt.com" class="contact-link" target="_blank" rel="noopener noreferrer">🛍️ Official PG Mall Shop</a></p>
            <p>🕒 Working hours: 9 AM – 9 PM (Senegal time / US MT). I reply usually within 2 hours. Let's build your new life together.</p>
            <div class="success-box"><p>💛 "From a battered mom to a confident earner — PG Mall and my team gave me a lifeline. I'll give you the same hand." — Nicole</p></div>`
        }
    };

    // Card categories and order
    const CARD_CATEGORIES = [
        { name: "❤️ My journey", items: ["nicole-story"] },
        { name: "💰 Earnings & rules", items: ["how-i-earn", "withdrawal-rules", "topup-steps"] },
        { name: "📋 Work guides", items: ["order-process", "extra-earnings", "credit-score"] },
        { name: "🔐 Trust & safety", items: ["why-pg-safe", "scam-warning"] },
        { name: "👥 Build your team", items: ["invite-friends"] },
        { name: "🏆 Proof & success", items: ["success-proof"] },
        { name: "📞 Get help", items: ["contact-nicole"] }
    ];

    const FLAT_CARDS = [];
    for (const cat of CARD_CATEGORIES) {
        for (const id of cat.items) {
            FLAT_CARDS.push({ id, title: ARTICLES[id].title, desc: ARTICLES[id].meta });
        }
    }

    const homeContainer = document.getElementById('homeContainer');
    const detailContainer = document.getElementById('detailContainer');
    const cardsArea = document.getElementById('cardsArea');
    const detailContentDiv = document.getElementById('detailContent');
    const backBtn = document.getElementById('backHomeBtn');
    const tocContainer = document.getElementById('tocContainer');
    const toggleTocBtn = document.getElementById('toggleTocBtn');
    const tocContentDiv = document.getElementById('tocContent');

    function renderCards() {
        cardsArea.innerHTML = '';
        for (const card of FLAT_CARDS) {
            const article = ARTICLES[card.id];
            const cardElem = document.createElement('div');
            cardElem.className = 'card';
            cardElem.innerHTML = `<h3>${card.title}</h3><p>${article?.meta || card.desc}</p><div class="badge">📘 Read more →</div>`;
            cardElem.addEventListener('click', (function(id) { return () => showDetail(id); })(card.id));
            cardsArea.appendChild(cardElem);
        }
        generateTOC();
    }

    function generateTOC() {
        tocContainer.innerHTML = '';
        for (const cat of CARD_CATEGORIES) {
            const catDiv = document.createElement('div');
            catDiv.className = 'toc-category';
            const header = document.createElement('div');
            header.className = 'category-header';
            const titleSpan = document.createElement('span');
            titleSpan.className = 'category-title';
            titleSpan.innerText = cat.name;
            const iconSpan = document.createElement('span');
            iconSpan.className = 'collapse-icon';
            iconSpan.innerText = '▶';
            header.appendChild(titleSpan);
            header.appendChild(iconSpan);
            const grid = document.createElement('div');
            grid.className = 'toc-grid collapsed';
            for (const id of cat.items) {
                const item = document.createElement('div');
                item.className = 'toc-item';
                item.textContent = ARTICLES[id].title;
                item.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const targetCard = document.getElementById(`card-${id}`);
                    if (targetCard) targetCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
                grid.appendChild(item);
            }
            catDiv.appendChild(header);
            catDiv.appendChild(grid);
            header.addEventListener('click', () => {
                const isCollapsed = grid.classList.toggle('collapsed');
                iconSpan.innerText = isCollapsed ? '▶' : '▼';
            });
            tocContainer.appendChild(catDiv);
        }
    }

    let guideVisible = false;
    toggleTocBtn.addEventListener('click', () => {
        guideVisible = !guideVisible;
        if (guideVisible) {
            tocContentDiv.classList.add('visible');
            toggleTocBtn.textContent = '📁 Hide guide';
        } else {
            tocContentDiv.classList.remove('visible');
            toggleTocBtn.textContent = '📂 Show guide menu';
        }
    });

    function showDetail(articleId) {
        savedScrollPosition = window.scrollY;
        const article = ARTICLES[articleId];
        if (!article) return;
        detailContentDiv.innerHTML = `<div class="detail-title">${article.title}</div><div class="detail-meta">📌 ${article.meta}</div><div class="detail-text">${article.content}</div>`;
        homeContainer.classList.add('hidden');
        detailContainer.classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'instant' });
        if (history.pushState) history.pushState({ view: 'detail', id: articleId }, '', `#${articleId}`);
    }

    function backToHome() {
        detailContainer.classList.add('hidden');
        homeContainer.classList.remove('hidden');
        setTimeout(() => window.scrollTo({ top: savedScrollPosition, behavior: 'instant' }), 10);
        if (location.hash) history.replaceState(null, '', ' ');
    }

    window.addEventListener('popstate', (e) => {
        if (!detailContainer.classList.contains('hidden')) backToHome();
        else if (location.hash && location.hash.length > 1) showDetail(location.hash.slice(1));
    });
    backBtn.addEventListener('click', backToHome);
    renderCards();
    if (location.hash && location.hash.length > 1) showDetail(location.hash.slice(1));
</script>
</body>
</html>
